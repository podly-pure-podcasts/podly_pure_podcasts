name: Docker Build Validation

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

permissions:
  contents: read

jobs:
  changes:
    runs-on: ubuntu-latest
    outputs:
      skip: ${{ steps.check_files.outputs.skip }}
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Check for documentation-only changes
        id: check_files
        run: |
          # For PRs, compare against the base branch. For pushes, compare against the previous commit.
          if [ "${{ github.event_name }}" = "pull_request" ]; then
            BASE_REF="${{ github.event.pull_request.base.ref }}"
            echo "Fetching base branch origin/$BASE_REF"
            git fetch --no-tags origin "$BASE_REF"
            BASE_SHA=$(git rev-parse "origin/$BASE_REF")
            HEAD_SHA=$(git rev-parse "${{ github.sha }}")
            echo "Comparing PR commits: $BASE_SHA...$HEAD_SHA"
            files_changed=$(git diff --name-only "$BASE_SHA"..."$HEAD_SHA")
          else
            echo "Comparing push commits: HEAD~1...HEAD"
            if git rev-parse HEAD~1 >/dev/null 2>&1; then
              files_changed=$(git diff --name-only HEAD~1 HEAD)
            else
              echo "Single commit push detected; using initial commit diff"
              files_changed=$(git diff-tree --no-commit-id --name-only -r HEAD)
            fi
          fi

          echo "Files changed:"
          echo "$files_changed"

          # grep exits 1 when every changed file matches the docs-only filter.
          # Treat that as "no non-doc files" rather than a failed workflow step.
          non_doc_files=$(printf '%s\n' "$files_changed" | grep -v -E '(^$|\.md$|^docs/|^LICENSE$|^LICENCE$)' || true)

          if [ -z "$non_doc_files" ]; then
            echo "Only documentation files were changed. Skipping Docker validation."
            echo "skip=true" >> $GITHUB_OUTPUT
          else
            echo "Code files were changed. Proceeding with Docker validation."
            echo "skip=false" >> $GITHUB_OUTPUT
          fi
        shell: bash

  ## test if build is successful, but don't run every permutation on PRs
  build-amd64-pr-lite:
    needs: changes
    if: ${{ needs.changes.outputs.skip == 'false' && github.event_name == 'pull_request' }}
    runs-on: ubuntu-latest
    strategy:
      matrix:
        variant:
          - name: "lite"
            base: "python:3.12-slim"
            gpu: "false"
            gpu_nvidia: "false"
            gpu_amd: "false"
            lite_build: "true"
    env:
      ARCH: amd64
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Free up disk space
        if: ${{ matrix.variant.gpu == 'true' || matrix.variant.gpu_nvidia == 'true' || matrix.variant.gpu_amd == 'true' }}
        run: |
          echo "Available disk space before cleanup:"
          df -h
          sudo rm -rf /usr/share/dotnet /usr/local/lib/android /opt/ghc /usr/local/share/boost
          sudo rm -rf /opt/microsoft/msedge /opt/microsoft/powershell /opt/pipx /usr/lib/mono
          sudo rm -rf /usr/local/.ghcup /usr/share/swift
          docker system prune -af
          echo "Available disk space after cleanup:"
          df -h

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3
        with:
          driver-opts: |
            image=moby/buildkit:v0.12.0

      - name: Build image
        uses: docker/build-push-action@v5
        with:
          context: .
          file: ./Dockerfile
          push: false
          platforms: linux/${{ env.ARCH }}
          build-args: |
            BASE_IMAGE=${{ matrix.variant.base }}
            USE_GPU=${{ matrix.variant.gpu }}
            USE_GPU_NVIDIA=${{ matrix.variant.gpu_nvidia }}
            USE_GPU_AMD=${{ matrix.variant.gpu_amd }}
            LITE_BUILD=${{ matrix.variant.lite_build }}
          # Temporarily disabled due to GitHub Actions Cache service outage
          # cache-from: type=gha
          # cache-to: type=gha,mode=max

  build-amd64:
    needs: changes
    if: ${{ needs.changes.outputs.skip == 'false' && github.event_name != 'pull_request' }}
    runs-on: ubuntu-latest
    strategy:
      matrix:
        variant:
          - name: "latest"
            base: "python:3.12-slim"
            gpu: "false"
            gpu_nvidia: "false"
            gpu_amd: "false"
            lite_build: "false"
          - name: "lite"
            base: "python:3.12-slim"
            gpu: "false"
            gpu_nvidia: "false"
            gpu_amd: "false"
            lite_build: "true"
    env:
      ARCH: amd64
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Free up disk space
        if: ${{ matrix.variant.gpu == 'true' || matrix.variant.gpu_nvidia == 'true' || matrix.variant.gpu_amd == 'true' }}
        run: |
          echo "Available disk space before cleanup:"
          df -h
          sudo rm -rf /usr/share/dotnet /usr/local/lib/android /opt/ghc /usr/local/share/boost
          sudo rm -rf /opt/microsoft/msedge /opt/microsoft/powershell /opt/pipx /usr/lib/mono
          sudo rm -rf /usr/local/.ghcup /usr/share/swift
          docker system prune -af
          echo "Available disk space after cleanup:"
          df -h

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3
        with:
          driver-opts: |
            image=moby/buildkit:v0.12.0

      - name: Build image
        uses: docker/build-push-action@v5
        with:
          context: .
          file: ./Dockerfile
          push: false
          platforms: linux/${{ env.ARCH }}
          build-args: |
            BASE_IMAGE=${{ matrix.variant.base }}
            USE_GPU=${{ matrix.variant.gpu }}
            USE_GPU_NVIDIA=${{ matrix.variant.gpu_nvidia }}
            USE_GPU_AMD=${{ matrix.variant.gpu_amd }}
            LITE_BUILD=${{ matrix.variant.lite_build }}
          # Temporarily disabled due to GitHub Actions Cache service outage
          # cache-from: type=gha
          # cache-to: type=gha,mode=max

  build-arm64:
    needs: changes
    if: ${{ needs.changes.outputs.skip == 'false' && github.event_name != 'pull_request' }}
    runs-on: ubuntu-latest
    strategy:
      matrix:
        variant:
          - {
              name: "latest",
              base: "python:3.12-slim",
              gpu: "false",
              gpu_nvidia: "false",
              gpu_amd: "false",
              lite_build: "false",
            }
          - {
              name: "lite",
              base: "python:3.12-slim",
              gpu: "false",
              gpu_nvidia: "false",
              gpu_amd: "false",
              lite_build: "true",
            }
    env:
      ARCH: arm64
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Free up disk space
        if: ${{ matrix.variant.gpu == 'true' || matrix.variant.gpu_nvidia == 'true' || matrix.variant.gpu_amd == 'true' }}
        run: |
          echo "Available disk space before cleanup:"
          df -h
          sudo rm -rf /usr/share/dotnet /usr/local/lib/android /opt/ghc /usr/local/share/boost
          sudo rm -rf /opt/microsoft/msedge /opt/microsoft/powershell /opt/pipx /usr/lib/mono
          sudo rm -rf /usr/local/.ghcup /usr/share/swift
          docker system prune -af
          echo "Available disk space after cleanup:"
          df -h

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v3

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3
        with:
          driver-opts: |
            image=moby/buildkit:v0.12.0

      - name: Build image
        uses: docker/build-push-action@v5
        with:
          context: .
          file: ./Dockerfile
          push: false
          platforms: linux/${{ env.ARCH }}
          build-args: |
            BASE_IMAGE=${{ matrix.variant.base }}
            USE_GPU=${{ matrix.variant.gpu }}
            USE_GPU_NVIDIA=${{ matrix.variant.gpu_nvidia }}
            USE_GPU_AMD=${{ matrix.variant.gpu_amd }}
            LITE_BUILD=${{ matrix.variant.lite_build }}
          # Temporarily disabled due to GitHub Actions Cache service outage
          # cache-from: type=gha
          # cache-to: type=gha,mode=max
