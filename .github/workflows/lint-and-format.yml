name: Python Linting, Formatting, and Testing

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main

jobs:
  lint-format-test:
    runs-on: ubuntu-latest
    env:
      PIPENV_VENV_IN_PROJECT: "1"
      PIP_DISABLE_PIP_VERSION_CHECK: "1"

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        id: python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: "pip"
          cache-dependency-path: "Pipfile.lock"

      - name: Install ffmpeg
        run: sudo apt-get update -y && sudo apt-get install -y --no-install-recommends ffmpeg

      - name: Install pipenv
        run: pip install pipenv

      - name: Cache pipenv virtualenv
        uses: actions/cache@v4
        with:
          path: .venv
          key: ${{ runner.os }}-venv-${{ steps.python.outputs.python-version }}-${{ hashFiles('Pipfile.lock') }}
          restore-keys: |
            ${{ runner.os }}-venv-${{ steps.python.outputs.python-version }}-

      - name: Cache mypy
        uses: actions/cache@v4
        with:
          path: .mypy_cache
          key: ${{ runner.os }}-mypy-${{ steps.python.outputs.python-version }}-${{ hashFiles('Pipfile.lock') }}
          restore-keys: |
            ${{ runner.os }}-mypy-${{ steps.python.outputs.python-version }}-

      - name: Install dependencies
        run: pipenv install --dev --deploy

      - name: Run focused mypy on boundary refinement integration
        run: >
          pipenv run mypy
          src/podcast_processor/boundary_refiner.py
          src/podcast_processor/word_boundary_refiner.py
          src/podcast_processor/ad_classifier.py
          src/podcast_processor/audio_processor.py
          src/shared/config.py
          src/app/config_store.py
          src/app/runtime_config.py
          src/app/models.py
          --install-types
          --non-interactive
          --explicit-package-bases
          --follow-imports=silent

      - name: Run pylint
        run: pipenv run pylint src --ignore=migrations,tests

      - name: Run black
        run: pipenv run black --check src

      - name: Run isort
        run: pipenv run isort --check-only src

      - name: Run pytest
        run: pipenv run pytest --disable-warnings
